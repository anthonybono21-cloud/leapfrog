<!DOCTYPE html>
<html><head><title>Leapfrog Test</title></head>
<body>
  <h1>Test Page</h1>
  <nav><a href="#home">Home</a><a href="#about">About</a></nav>
  <form>
    <input type="text" name="search" placeholder="Search..." aria-label="Search">
    <select name="color" aria-label="Color"><option>Red</option><option>Blue</option></select>
    <input type="checkbox" id="agree" aria-label="I agree">
    <button type="submit">Submit</button>
  </form>
  <div id="counter">Count: 0</div>
  <button onclick="document.getElementById('counter').textContent='Count: '+(++window.c||1)">Increment</button>
</body></html>
