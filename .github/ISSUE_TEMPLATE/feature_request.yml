name: Feature Request
description: Suggest an improvement or new capability
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Ideas welcome. The more context you give, the better.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like Leapfrog to do?
      placeholder: A clear description of the feature.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem does this solve? What workflow does it enable?
      placeholder: "When I'm using Leapfrog to..., I need to..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds or other tools?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Anything else -- screenshots, links, examples.
    validations:
      required: false
