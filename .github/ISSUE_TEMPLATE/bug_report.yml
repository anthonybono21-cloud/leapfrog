name: Bug Report
description: Something isn't working right
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in as much as you can.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Configure Leapfrog with...
        2. Call tool...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages if any.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.3 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js Version
      placeholder: "22.0.0"
    validations:
      required: true

  - type: input
    id: playwright
    attributes:
      label: Playwright Version
      placeholder: "1.59.0"
    validations:
      required: false

  - type: input
    id: client
    attributes:
      label: MCP Client
      placeholder: "Claude Code / Cursor / Windsurf / other"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Any relevant log output. Set `LEAP_LOG_LEVEL=debug` for verbose output.
      render: shell
    validations:
      required: false
